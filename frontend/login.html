<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassfolio-Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="container">
        <div class="login-container">
            <form id="login">
            <h1 class="login-txt">Login Page</h1>
            <input id="email" placeholder="Enter Email"></label><br>

       <input id="password" type="password" placeholder="Enter Password"></label><br>
        <input type="submit" value="Login">
        <p style="display: inline;">new user?<a href="register.html">register</a></p>
         </form>
        </div>
    </div>

    <script>

        document.getElementById("login").addEventListener("submit", async(event) => {
            event.preventDefault(); // Prevent the default form submission

            // Get form data
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Create a user object
            const userData = {
                email: email,
                password: password  
            };

            // Send a POST request to the backend API
            fetch("http://localhost:4646/api/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(userData)
            })
            .then(response => response.json())
            .then(data => {
                console.log("Success:", data);
                alert("Login successful!");
                window.location.href = "dashboard.html";
                // Handle login success (e.g., redirect to dashboard)
            })
            .catch((error) => {
                console.error("Error:", error);
                alert("Login failed. Please try again.");
            });
        });

    </script>
   
</body>
</html>
