<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashcontainer">
        <h1>Dashboard</h1>
       
        <header>
            <h2>Financial Status</h2>
        </header>

        <div class="createassetcontainer">
            <div class="assetcontainer">
                <h3>Create Asset</h3>
                <form id="createasset">
                    <input id="name" type="text" name="name" placeholder="Enter Asset" required><br><br>
                    <input id="category" type="text"  placeholder="Enter category" required><br><br>
                    <input id="value" type="number" placeholder="Enter value" required><br><br>
                    <input type="submit" value="Create Asset"><br>
                    </form>
            </div>

        </div>
         
        <div class="cards">
            <div class="card">
                <h3>Savings</h3>
                <p>$10,000</p>
            </div>

            <div class="card">
                <h3>Expenses</h3>
                <p>$7,500</p>
            </div>

            <div class="card">
                <h3>Income</h3> <br>
               
                <p>$2,500</p>
            </div>
        
        </div>
        
    </div>
    <script>
document.getElementById("createasset").addEventListener("submit", async (event) => {
    event.preventDefault();

    // 1. Get form data (Using .value directly)
    const name = document.getElementById("name").value;
    const category = document.getElementById("category").value;
    const value = document.getElementById("value").value;

    // 2. Read from LocalStorage
    const userData = localStorage.getItem("currentUser");

    if (!userData) {
        alert("No user found! Redirecting to login...");
        window.location.href = "login.html";
        return;
    }

    try {
        const user = JSON.parse(userData);
        
        // DEBUG: See exactly what is inside your user object in the console
        console.log("Current User Object:", user);

        // 3. Extract the ID (Handles MongoDB _id or standard id)
        // If your login response nests the user, it checks user.user._id as well
        const userId = user._id || user.id || (user.user && (user.user._id || user.user.id));

        if (!userId) {
            console.error("ID NOT FOUND. Available keys:", Object.keys(user));
            alert("User ID missing from storage. Please log in again.");
            return;
        }

        const assetData = { 
            name: name, 
            category: category, 
            value: Number(value) // Ensure value is a number for the backend
        };

        console.log(`Sending request to: http://localhost:4646/api/assets/${userId}`);

        // 4. Send to Backend
        const response = await fetch(`http://localhost:4646/api/assets/${userId}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(assetData)
        });

        const result = await response.json();

        if (response.ok) {
            alert("Asset created successfully!");
            console.log("Server Response:", result);
            document.getElementById("createasset").reset();
             // Clear the form
        } else {
            console.error("Server Error Details:", result);
            alert("Failed to create asset: " + (result.message || "Unknown error"));
             window.location.href = "login.html";
        }

    } catch (error) {
        console.error("Script Error:", error);
        alert("An error occurred. Check the console for details.");
    }
});
</script>

    
</body>
</html>
