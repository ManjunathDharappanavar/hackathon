<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassfolio-Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="register-container">
            <h1>Register</h1>
            <form action="">
                <input type="text" name="username" id="username" placeholder="Enter Username" required><br><br>
                <input type="email" name="email" placeholder="Enter Email" required><br><br>
                <input type="password" placeholder="Create password" required><br><br>
              

                <input type="submit" value="Register" ><br>
                <p class="para" style="display: inline;">Back to login<a href="login.html">Login</a></p>
            </form>
        </div>
    </div>

</body>
</html>
